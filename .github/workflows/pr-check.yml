name: PR check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build, test, verify dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # dist/ is gitignored — consumers regenerate it on `pnpm install`
      # via the `prepare` script (`test -d dist || tsup`). The build step
      # above just verifies the current src/ produces dist/ cleanly.

  docs-check:
    name: Doc hygiene
    runs-on: ubuntu-latest
    # Reminders + CLAUDE.md lint. Lint failure blocks merge; doc-hygiene
    # script only prints reminders. Strict cross-repo verifiers live in
    # flatie-tech/flatie-docs CI (Phase E).
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run doc-hygiene reminders (non-blocking)
        run: bash scripts/check-doc-hygiene.sh
      - name: Lint CLAUDE.md (blocking)
        run: bash scripts/lint-claude-md.sh
